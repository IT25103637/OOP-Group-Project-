<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::div.content})">
<head>
    <title>Add Vehicle</title>
</head>
<body>
<div class="content flex justify-center py-12 bg-rofi-white min-h-screen px-4">
    <div class="w-full max-w-3xl">
        
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100">
            
            <div class="mb-10 border-b border-gray-100 pb-6 text-center">
                <h2 class="text-3xl font-black text-rofi-black tracking-tight mb-2">Add New Vehicle</h2>
                <p class="text-gray-500 font-bold text-sm">Expand your fleet inventory with LKR pricing.</p>
            </div>

            <form th:action="@{/vehicles/add}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Vehicle Type</label>
                        <select name="type" id="vehicleType" required onchange="toggleFields()" 
                                class="w-full px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow appearance-none">
                            <option value="">Select Type</option>
                            <option value="CAR">🚗 Car</option>
                            <option value="BIKE">🏍️ Bike</option>
                            <option value="VAN">🚚 Van</option>
                            <option value="TRUCK">🚛 Truck</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Daily Rate</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-rofi-yellow font-black">LKR</div>
                            <input type="number" step="0.01" name="pricePerDay" required placeholder="0.00"
                                   class="w-full pl-14 px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Brand</label>
                        <input type="text" name="brand" required placeholder="e.g. Toyota"
                               class="w-full px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Model</label>
                        <input type="text" name="model" required placeholder="e.g. Corolla"
                               class="w-full px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Location</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                            </div>
                            <input type="text" name="location" required placeholder="Full address or area name"
                                   class="w-full pl-12 px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                        </div>
                    </div>
                </div>

                <!-- Dynamic Subclass Fields area -->
                <div class="mt-8 p-6 bg-yellow-50 rounded-2xl border border-yellow-100">
                    <h5 class="text-xs font-black text-rofi-yellow uppercase tracking-widest mb-4 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Type Specific Details
                    </h5>
                    
                    <p id="defaultPrompt" class="text-gray-500 font-bold text-sm">Select a vehicle type to configure specific options.</p>

                    <!-- Car specific -->
                    <div class="specific-field hidden" id="carFields">
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Number of Seats</label>
                        <input type="number" name="numberOfSeats" value="4" 
                               class="w-full md:w-1/2 px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow">
                    </div>

                    <!-- Bike specific -->
                    <div class="specific-field hidden" id="bikeFields">
                        <label class="flex items-center p-4 border border-gray-300 rounded-xl bg-white cursor-pointer hover:border-rofi-yellow transition-colors w-full md:w-1/2 shadow-sm">
                            <input type="checkbox" name="hasCarrier" id="hasCarrier" value="true" class="w-5 h-5 text-rofi-yellow border-gray-300 rounded focus:ring-rofi-yellow">
                            <span class="ml-3 text-sm font-black text-rofi-black">Equipped with Storage Carrier</span>
                        </label>
                    </div>

                    <!-- Van specific -->
                    <div class="specific-field hidden" id="vanFields">
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Cargo Capacity (kg)</label>
                        <input type="number" step="0.1" name="cargoCapacity" value="0.0" 
                               class="w-full md:w-1/2 px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow">
                    </div>

                    <!-- Truck specific -->
                    <div class="specific-field hidden" id="truckFields">
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Payload Capacity (tons)</label>
                        <input type="number" name="payloadCapacity" value="0" 
                               class="w-full md:w-1/2 px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold focus:outline-none focus:ring-2 focus:ring-rofi-yellow">
                    </div>
                </div>

                <div class="pt-6 flex flex-col sm:flex-row gap-4">
                    <button type="submit" class="flex-1 py-4 px-4 bg-rofi-yellow hover:bg-yellow-500 text-rofi-black font-black text-lg rounded-full transition-all shadow-md">
                        Publish to Fleet
                    </button>
                    <a href="/vehicles" class="px-8 py-4 bg-white border border-gray-300 text-gray-700 hover:bg-gray-100 text-center font-black text-lg rounded-full transition-colors">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleFields() {
            var type = document.getElementById('vehicleType').value;
            var fields = document.getElementsByClassName('specific-field');
            var prompt = document.getElementById('defaultPrompt');
            
            for (var i = 0; i < fields.length; i++) {
                fields[i].classList.add('hidden');
            }
            
            if (type) {
                prompt.classList.add('hidden');
                if (type === 'CAR') document.getElementById('carFields').classList.remove('hidden');
                if (type === 'BIKE') document.getElementById('bikeFields').classList.remove('hidden');
                if (type === 'VAN') document.getElementById('vanFields').classList.remove('hidden');
                if (type === 'TRUCK') document.getElementById('truckFields').classList.remove('hidden');
            } else {
                prompt.classList.remove('hidden');
            }
        }
    </script>
</div>
</body>
</html>
