<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::div.content})">
<head>
    <title>Payment</title>
</head>
<body>
<div class="content bg-rofi-white min-h-screen flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

            <!-- Header -->
            <div class="bg-rofi-black p-8 text-center">
                <div class="w-16 h-16 bg-rofi-yellow rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                    </svg>
                </div>
                <h2 class="text-white text-2xl font-black tracking-tight">Payment Details</h2>
                <p class="text-gray-400 text-sm font-bold mt-1">Enter your information to complete the booking.</p>
            </div>

            <!-- Success Banner (shown after payment) -->
            <div th:if="${status != null}" class="mx-6 mt-6 p-4 bg-green-100 border border-green-300 rounded-xl text-center">
                <span class="text-green-800 font-black text-lg" th:text="${status}">Payment Status: PAID</span>
            </div>

            <!-- Payment Form -->
            <form action="/process-simple-payment" method="post" class="p-8 space-y-5"
                  th:if="${status == null}">

                <!-- Customer Name -->
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Full Name</label>
                    <input type="text" name="customerName" placeholder="e.g. Kasun Perera"
                           required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-rofi-black font-bold focus:outline-none focus:border-rofi-yellow focus:ring-2 focus:ring-yellow-100 transition-all" />
                </div>

                <!-- Mobile -->
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Mobile Number</label>
                    <input type="tel" name="mobileNumber" placeholder="+94 7X XXX XXXX"
                           required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-rofi-black font-bold focus:outline-none focus:border-rofi-yellow focus:ring-2 focus:ring-yellow-100 transition-all" />
                </div>

                <!-- Card Number -->
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Card Number</label>
                    <input type="text" name="cardNumber" placeholder="1234 5678 9012 3456"
                           maxlength="19" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-rofi-black font-bold tracking-widest focus:outline-none focus:border-rofi-yellow focus:ring-2 focus:ring-yellow-100 transition-all" />
                </div>

                <!-- Expiry + CVV -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Expiry</label>
                        <input type="text" name="expiryDate" placeholder="MM / YY"
                               maxlength="7" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-rofi-black font-bold tracking-widest focus:outline-none focus:border-rofi-yellow focus:ring-2 focus:ring-yellow-100 transition-all" />
                    </div>
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">CVV</label>
                        <input type="password" name="cvv" placeholder="•••"
                               maxlength="4" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-rofi-black font-bold tracking-widest focus:outline-none focus:border-rofi-yellow focus:ring-2 focus:ring-yellow-100 transition-all" />
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-4 bg-gradient-to-r from-[#FFC107] to-[#FF9800] text-white text-lg font-black rounded-2xl hover:shadow-lg transition-all transform hover:-translate-y-0.5 mt-2">
                    Submit Payment
                </button>

                <p class="text-center text-xs text-gray-400 font-medium">
                    🔒 Simulated payment — no real charges are made.
                </p>

            </form>

            <!-- Post-payment actions (shown after PAID) -->
            <div th:if="${status != null}" class="px-8 pb-8 flex flex-col gap-3">
                <a href="/bookings/history"
                   class="w-full py-3.5 bg-rofi-black text-white font-black rounded-2xl text-center hover:bg-gray-800 transition-colors">
                    My Bookings
                </a>
                <a href="/"
                   class="w-full py-3.5 bg-gradient-to-r from-[#FFC107] to-[#FF9800] text-white font-black rounded-2xl text-center hover:shadow-lg transition-all">
                    Back to Home
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
