<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::div.content})">
<head>
    <title>Return Vehicle</title>
</head>
<body>
<div class="content flex justify-center py-12 bg-rofi-white min-h-[80vh]">
    <div class="w-full max-w-lg px-4">
        
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            
            <div class="p-8 text-center border-b border-gray-100 bg-gray-50">
                <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 bg-green-100 text-green-600 shadow-inner">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-rofi-black mb-1">Return Summary</h2>
                <p class="text-gray-500 font-bold text-sm">Vehicle return processed successfully.</p>
            </div>

            <div class="p-8">
                
                <!-- Base Cost -->
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-500 font-bold">Base Rental Cost</span>
                    <span class="text-rofi-black font-black text-xl">LKR <span th:text="${booking.totalCost != null ? #numbers.formatDecimal(booking.totalCost, 1, 'COMMA', 2, 'POINT') : '0.00'}"></span></span>
                </div>
                
                <!-- Member 03: Delay Charges in LKR -->
                <div th:if="${booking.lateFee > 0}" class="bg-yellow-50 border border-rofi-yellow rounded-xl p-5 mb-6">
                    <div class="flex justify-between items-center text-rofi-black mb-1">
                        <span class="font-black uppercase tracking-wider text-sm flex items-center">
                            <span class="text-xl mr-2">⚠️</span> Delay Charges
                        </span>
                        <span class="font-black text-xl text-red-600">+ LKR <span th:text="${booking.lateFee != null ? #numbers.formatDecimal(booking.lateFee, 1, 'COMMA', 2, 'POINT') : '0.00'}"></span></span>
                    </div>
                    <p class="text-xs font-bold text-gray-500 mt-2 border-t border-yellow-200 pt-2">
                        Vehicle returned on <span th:text="${booking.returnDate != null ? #temporals.format(booking.returnDate, 'dd, MMMM, yyyy') : ''}"></span> (past due date: <span th:text="${booking.endDate != null ? #temporals.format(booking.endDate, 'dd, MMMM, yyyy') : ''}"></span>).
                    </p>
                </div>

                <div class="border-t-2 border-dashed border-gray-200 my-6"></div>

                <div class="flex justify-between items-end mb-8">
                    <span class="text-gray-500 font-black uppercase tracking-widest text-sm">Total Paid</span>
                    <span class="text-4xl font-black text-rofi-black">LKR <span th:text="${(booking.totalCost + booking.lateFee) != null ? #numbers.formatDecimal(booking.totalCost + booking.lateFee, 1, 'COMMA', 2, 'POINT') : '0.00'}"></span></span>
                </div>

                <a href="/admin/dashboard" class="block w-full text-center py-4 bg-rofi-yellow hover:bg-yellow-500 text-rofi-black text-lg font-black rounded-full transition-colors shadow-md">
                    Finish Process
                </a>
            </div>
            
        </div>
        
    </div>
</div>
</body>
</html>
