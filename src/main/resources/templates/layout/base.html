<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Rental Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rofi: {
                            black: '#000000',
                            yellow: '#FFC107',
                            white: '#F9F9F9',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Dark Mode Implementation -->
    <script>
        // Check local storage for dark mode preference before page loads to prevent flickering
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        /* Global Dark Mode Overrides */
        html.dark body { background-color: #121212 !important; color: #f9f9f9 !important; }
        html.dark .bg-white { background-color: #1e1e1e !important; border-color: #333 !important; }
        html.dark .bg-rofi-white { background-color: #121212 !important; }
        html.dark .text-rofi-black { color: #f9f9f9 !important; }
        html.dark .text-gray-900, html.dark .text-gray-700, html.dark .text-gray-500, html.dark .text-gray-600 { color: #d1d5db !important; }
        html.dark .border-gray-200, html.dark .border-gray-100, html.dark .border-gray-300 { border-color: #333 !important; }
        html.dark .bg-gray-50, html.dark .bg-gray-100 { background-color: #2d2d2d !important; border-color: #444 !important; }
        html.dark header, html.dark footer { background-color: #1e1e1e !important; border-color: #333 !important; }
        html.dark .shadow-sm, html.dark .shadow-md, html.dark .shadow-xl { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5) !important; }
        html.dark input, html.dark select { background-color: #2d2d2d !important; color: #fff !important; border-color: #444 !important; }
        html.dark .hover\:bg-gray-50:hover { background-color: #333 !important; }
        html.dark .hover\:bg-gray-100:hover { background-color: #444 !important; }
    </style>
</head>
<body class="bg-rofi-white text-rofi-black font-sans antialiased min-h-screen flex flex-col">

    <!-- Top Navbar -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-3xl font-black text-rofi-black tracking-tighter flex items-center">
                        <span class="w-10 h-10 bg-rofi-yellow rounded-lg flex items-center justify-center mr-2 text-white shadow-md">R</span>
                        RENTX
                    </a>
                </div>
                
                <!-- Desktop Nav -->
                <nav class="hidden md:flex space-x-8 font-bold text-sm">
                    <a href="/" class="text-gray-900 hover:text-rofi-yellow transition-colors">Home</a>
                    <a href="/vehicles" class="text-gray-900 hover:text-rofi-yellow transition-colors">Vehicles</a>
                    <a th:if="${session.loggedInUser != null && session.loggedInUser.role.name() == 'ADMIN'}" href="/admin/dashboard" class="text-gray-900 hover:text-rofi-yellow transition-colors">Dashboard</a>
                    <a th:if="${session.loggedInUser != null && session.loggedInUser.role.name() == 'ADMIN'}" href="/admin/payments" class="text-gray-900 hover:text-rofi-yellow transition-colors">Payments</a>
                    <a th:if="${session.loggedInUser != null && session.loggedInUser.role.name() == 'ADMIN'}" href="/bookings/list" class="text-gray-900 hover:text-rofi-yellow transition-colors">Bookings</a>
                    <a th:if="${session.loggedInUser != null && session.loggedInUser.role.name() == 'CUSTOMER'}" href="/bookings/history" class="text-gray-900 hover:text-rofi-yellow transition-colors">My Bookings</a>
                </nav>

                <!-- Right Side (Auth & Dark Mode) -->
                <div class="flex items-center space-x-4">
                    <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center">
                        <span id="sunIcon" class="hidden text-xl">☀️</span>
                        <span id="moonIcon" class="text-xl">🌙</span>
                    </button>
                
                    <th:block th:if="${session.loggedInUser == null}">
                        <a href="/users/login" class="text-sm font-bold text-rofi-black hover:text-rofi-yellow transition-colors hidden sm:block">Log In</a>
                        <a href="/users/register" class="text-sm font-bold text-white bg-gradient-to-r from-[#FFC107] to-[#FF9800] px-6 py-2.5 rounded-full hover:shadow-lg hover:scale-105 transition-all shadow-md">Sign Up</a>
                    </th:block>
                    
                    <th:block th:if="${session.loggedInUser != null}">
                        <a href="/users/profile" class="w-10 h-10 rounded-full bg-rofi-yellow flex items-center justify-center text-white font-bold text-lg hover:shadow-md transition-shadow">
                            <span th:text="${#strings.substring(session.loggedInUser.name,0,1).toUpperCase()}">U</span>
                        </a>
                        <a href="/users/logout" class="text-sm font-bold text-red-500 hover:text-red-700 transition-colors hidden sm:block ml-2">Logout</a>
                    </th:block>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full">
        <div th:replace="${content}"></div>
    </main>

    <!-- Simple Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center mb-4 md:mb-0">
                <span class="text-2xl font-black text-rofi-black tracking-tighter flex items-center">
                    <span class="w-8 h-8 bg-rofi-yellow rounded flex items-center justify-center mr-2 text-white">R</span>
                    RENTX
                </span>
            </div>
            <p class="text-gray-500 text-sm font-medium">RenTex All rights received</p>
        </div>
    </footer>

    <!-- Dark Mode Toggle Script -->
    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        // Update icons based on current theme
        if (document.documentElement.classList.contains('dark')) {
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            // Toggle icons
            sunIcon.classList.toggle('hidden');
            moonIcon.classList.toggle('hidden');

            // Toggle theme
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
