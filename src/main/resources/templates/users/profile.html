<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::div.content})">
<head>
    <title>My Profile</title>
</head>
<body>
<div class="content flex justify-center py-12 bg-rofi-white min-h-[80vh] px-4">
    <div class="w-full max-w-lg">
        
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
            
            <div class="text-center mb-10">
                <div class="w-24 h-24 mx-auto rounded-full bg-rofi-yellow flex items-center justify-center text-4xl font-black text-white mb-6 shadow-md" th:text="${#strings.substring(user.name,0,1).toUpperCase()}">A</div>
                <h2 class="text-3xl font-black text-rofi-black tracking-tight mb-1">My Profile</h2>
                <p class="text-gray-500 font-bold text-sm">Update your account details.</p>
            </div>

            <div th:if="${param.success}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-200 text-green-700 font-bold text-sm flex items-center shadow-sm">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Profile updated successfully.
            </div>
            
            <form th:action="@{/users/profile}" th:object="${user}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Account Role</label>
                        <div class="px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 font-mono text-sm cursor-not-allowed font-bold">
                            <span th:text="${user.role}"></span>
                        </div>
                    </div>
                    <div>
                        <label for="email" class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Email</label>
                        <div class="px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 text-sm truncate cursor-not-allowed font-bold">
                            <span th:text="${user.email}"></span>
                            <input type="hidden" th:field="*{email}">
                        </div>
                    </div>
                </div>

                <div>
                    <label for="name" class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" required 
                           class="w-full px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                </div>
                
                <div>
                    <label for="password" class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">New Password <span class="text-gray-400 font-normal">(Leave blank to keep current)</span></label>
                    <input type="password" id="password" th:field="*{password}" 
                           class="w-full px-4 py-3.5 bg-white border border-gray-300 rounded-xl text-rofi-black font-bold placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-rofi-yellow transition-all">
                </div>

                <button type="submit" class="w-full py-4 px-4 bg-rofi-yellow hover:bg-yellow-500 text-rofi-black font-black rounded-full transition-all shadow-md mt-8 text-lg">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
