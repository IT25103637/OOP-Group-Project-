<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::div.content})">
<head>
    <title>Manage Users</title>
</head>
<body>
<div class="content bg-rofi-white min-h-screen py-10">
    <div class="max-w-7xl mx-auto px-4">
        
        <div class="flex justify-between items-end mb-10 pb-4 border-b border-gray-200">
            <div>
                <h2 class="text-3xl font-black text-rofi-black tracking-tight">Manage Users</h2>
                <p class="text-gray-500 font-bold mt-1">System user administration.</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-black tracking-wider border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4">ID (UUID)</th>
                        <th class="px-6 py-4">Full Name</th>
                        <th class="px-6 py-4">Email Address</th>
                        <th class="px-6 py-4">System Role</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-rofi-black font-bold">
                    
                    <tr th:each="u : ${users}" class="hover:bg-yellow-50 transition-colors">
                        <td class="px-6 py-5 font-mono text-xs text-gray-500" th:text="${u.id}"></td>
                        <td class="px-6 py-5 font-black flex items-center">
                            <div class="w-8 h-8 rounded-full bg-rofi-yellow text-white flex items-center justify-center text-xs mr-3 shadow-sm" th:text="${#strings.substring(u.name,0,1).toUpperCase()}">A</div>
                            <span th:text="${u.name}">John Doe</span>
                        </td>
                        <td class="px-6 py-5 text-gray-600" th:text="${u.email}">john@example.com</td>
                        <td class="px-6 py-5">
                            <span th:if="${u.role.name() == 'ADMIN'}" class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-black bg-purple-100 text-purple-700">ADMIN</span>
                            <span th:if="${u.role.name() == 'CUSTOMER'}" class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-black bg-blue-100 text-blue-700">CUSTOMER</span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <a th:if="${u.id != session.loggedInUser.id}" 
                               th:href="@{/admin/users/delete/{id}(id=${u.id})}" 
                               class="inline-flex items-center px-4 py-2 bg-white hover:bg-red-50 text-red-600 text-xs font-black rounded-lg border border-red-200 transition-colors shadow-sm"
                               onclick="return confirm('Are you sure you want to delete this user? This cannot be undone.');">
                                Delete
                            </a>
                            <span th:if="${u.id == session.loggedInUser.id}" class="inline-flex items-center px-3 py-1.5 text-gray-400 text-xs font-black">
                                Current User
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="5" class="px-6 py-12 text-center text-gray-400 font-black">No users found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
